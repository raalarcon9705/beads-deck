<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0052CC"/>
      <stop offset="0.55" stop-color="#0A6CD6"/>
      <stop offset="1" stop-color="#00A3BF"/>
    </linearGradient>
    <linearGradient id="thread" x1="96" y1="320" x2="416" y2="192" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0.9"/>
    </linearGradient>
    <filter id="ds" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#001A4D" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- App squircle background -->
  <rect x="16" y="16" width="480" height="480" rx="116" fill="url(#bg)"/>

  <!-- Board columns (kanban) -->
  <g fill="#FFFFFF" opacity="0.16">
    <rect x="120" y="150" width="64" height="212" rx="26"/>
    <rect x="224" y="150" width="64" height="212" rx="26"/>
    <rect x="328" y="150" width="64" height="212" rx="26"/>
  </g>

  <!-- Thread weaving across the board -->
  <path d="M 120 320 C 180 230, 224 230, 256 256 C 290 284, 332 200, 392 192"
        stroke="url(#thread)" stroke-width="20" stroke-linecap="round" fill="none"/>

  <!-- Beads on the thread, one per column -->
  <g filter="url(#ds)">
    <circle cx="152" cy="300" r="34" fill="#FFFFFF"/>
    <circle cx="256" cy="256" r="40" fill="#FFFFFF"/>
    <circle cx="360" cy="196" r="34" fill="#FFFFFF"/>
  </g>
  <!-- Inner accents on beads -->
  <circle cx="152" cy="300" r="13" fill="#0052CC"/>
  <circle cx="256" cy="256" r="15" fill="#00A3BF"/>
  <circle cx="360" cy="196" r="13" fill="#0A6CD6"/>
</svg>
